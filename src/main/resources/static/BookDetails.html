<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-red-500 font-sans min-h-screen">
<header class="bg-gray-900 flex justify-between items-center p-4 shadow-md">
  <img src="Inner Voice Logo.png" alt="logo" class="w-40 rounded-full">

  <button onclick="history.back()" class="bg-black text-red-500 border-2 border-red-500 px-6 py-2 rounded-xl hover:bg-red-500 hover:text-black transition">
    Back
  </button>

</header>

<center>
<div class="bg-gray-900/80 flex flex-col items-center justify-center p-6 mt-[10%] rounded-2xl shadow-lg w-80 text-center space-y-4">
  <img id="image" alt="Book Cover" class="w-40 h-40 mx-auto object-cover rounded-lg shadow-md">

  <h1 id="bookTitle" class="text-2xl font-bold"></h1>

  <div class="space-y-4 w-[90%]">
    <div class="flex justify-center">
      <button id="playButton" onclick="toggleAudio()"
              class="w-16 h-16 rounded-full bg-red-600 hover:bg-red-700 text-white text-2xl flex items-center justify-center shadow-lg hover:shadow-red-500 transition duration-300 ease-in-out">
        <svg id="icon" xmlns="http://www.w3.org/2000/svg" fill="none" class="w-6 h-6" viewBox="0 0 24 24" stroke="currentColor">
          <path id="iconPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M5 3v18l15-9L5 3z" />
        </svg>
      </button>
    </div>

    <div class="relative h-2 bg-gray-700 rounded overflow-hidden cursor-pointer w-full" id="seekBar">
      <div id="progressBar" class="absolute top-0 left-0 h-2 bg-red-500 w-0"></div>
    </div>

    <div class="flex justify-between text-xs text-gray-400">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <!-- AI Summary Section -->
  <div class="mt-6 w-full text-left space-y-3 border-t border-gray-700 pt-4">
    <h2 class="text-lg font-bold text-white">AI Book Summary ⭐⭐⭐⭐⭐</h2>
    <p class="text-sm text-gray-400">Instead of reading long descriptions, let AI summarize it for you!</p>
    
    <div class="flex flex-col space-y-2">
      <button onclick="generateSummary(50)" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition font-semibold">Generate 50-word summary</button>
      <button onclick="generateSummary(100)" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition font-semibold">Generate 100-word summary</button>
      <button onclick="generateSummary('keypoints')" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition font-semibold">Generate Key Points</button>
    </div>

    <div id="summaryContainer" class="hidden mt-4 p-4 bg-gray-800 rounded-lg shadow-inner">
      <h3 class="text-md font-bold text-yellow-400 mb-2">AI Generated Summary</h3>
      <div id="summaryContent" class="text-gray-300 text-sm whitespace-pre-line leading-relaxed flex items-center justify-center min-h-[4rem]">
        <!-- Summary text or loader goes here -->
      </div>
    </div>
  </div>

</div>
</center>
<audio id="audio" src="dummy.mp3"></audio>

<script src="BookDetails.js">


</script>

</body>
</html>
