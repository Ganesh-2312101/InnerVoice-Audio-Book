<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Details — InnerVoice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="tabicon.png">
  <link rel="stylesheet" href="home1.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b0f17] text-gray-100 min-h-screen flex flex-col font-sans antialiased selection:bg-red-500 selection:text-white">

  <!-- Header -->
  <header class="glass-nav sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-xl">
    <div class="flex items-center space-x-3">
      <img src="Inner Voice Logo.png" alt="logo" class="w-9 h-9 rounded-xl">
      <span class="text-xl font-extrabold text-white">Inner<span class="gradient-text-red">Voice</span></span>
    </div>

    <button onclick="history.back()" class="flex items-center space-x-2 px-4 py-2 text-xs md:text-sm font-bold text-gray-300 hover:text-white bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl transition-all">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Back</span>
    </button>
  </header>

  <!-- Player Main Container -->
  <main class="flex-1 flex items-center justify-center p-4 sm:p-6">
    <div class="w-full max-w-md bg-slate-900/90 border border-slate-800 rounded-3xl p-6 sm:p-8 shadow-2xl backdrop-blur-2xl space-y-6">
      
      <!-- Book Cover Image -->
      <div class="relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-red-600 to-amber-600 rounded-2xl blur-xl opacity-30 group-hover:opacity-50 transition duration-500"></div>
        <img id="image" alt="Book Cover" class="relative w-48 h-64 mx-auto object-cover rounded-2xl shadow-2xl border border-slate-700/50">
      </div>

      <!-- Title -->
      <div class="text-center space-y-1">
        <h1 id="bookTitle" class="text-2xl font-black text-white tracking-tight line-clamp-2"></h1>
        <p class="text-xs text-red-400 font-semibold uppercase tracking-wider">Audiobook Stream</p>
      </div>

      <!-- Player Controls -->
      <div class="space-y-4 pt-2">
        <div class="flex justify-center">
          <button id="playButton" onclick="toggleAudio()"
                  class="w-16 h-16 rounded-full bg-gradient-to-tr from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white text-2xl flex items-center justify-center shadow-lg hover:shadow-red-500/50 transform hover:scale-105 transition duration-300">
            <svg id="icon" xmlns="http://www.w3.org/2000/svg" fill="none" class="w-7 h-7 ml-0.5" viewBox="0 0 24 24" stroke="currentColor">
              <path id="iconPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 3v18l15-9L5 3z" />
            </svg>
          </button>
        </div>

        <!-- Progress bar -->
        <div class="space-y-1.5">
          <div class="relative h-2 bg-slate-800 rounded-full overflow-hidden cursor-pointer w-full border border-slate-700/50" id="seekBar">
            <div id="progressBar" class="absolute top-0 left-0 h-full bg-gradient-to-r from-red-500 to-red-400 rounded-full w-0 transition-all"></div>
          </div>
          <div class="flex justify-between text-xs font-semibold text-gray-400 px-1">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>
      </div>

      <!-- AI Summary Section -->
      <div class="pt-4 border-t border-slate-800 space-y-3">
        <div class="flex items-center space-x-2">
          <i class="fa-solid fa-wand-magic-sparkles text-amber-400"></i>
          <h2 class="text-base font-bold text-white">AI Instant Summary</h2>
        </div>
        <p class="text-xs text-gray-400">Generate an instant AI overview of this book:</p>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
          <button onclick="generateSummary(50)" class="py-2 px-3 text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 text-gray-200 hover:text-white rounded-xl font-bold transition">
            50 Words
          </button>
          <button onclick="generateSummary(100)" class="py-2 px-3 text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 text-gray-200 hover:text-white rounded-xl font-bold transition">
            100 Words
          </button>
          <button onclick="generateSummary('keypoints')" class="py-2 px-3 text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 text-gray-200 hover:text-white rounded-xl font-bold transition">
            Key Points
          </button>
        </div>

        <div id="summaryContainer" class="hidden mt-4 p-4 bg-slate-950/80 border border-slate-800 rounded-2xl shadow-inner">
          <h3 class="text-xs font-bold text-amber-400 uppercase tracking-wider mb-2 flex items-center space-x-1">
            <i class="fa-solid fa-sparkles"></i>
            <span>AI Output</span>
          </h3>
          <div id="summaryContent" class="text-gray-300 text-xs whitespace-pre-line leading-relaxed flex items-center justify-center min-h-[4rem]">
          </div>
        </div>
      </div>

    </div>
  </main>

  <audio id="audio" src="dummy.mp3"></audio>

  <script src="BookDetails.js"></script>
</body>
</html>
