<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inner Voice</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" type="image/png" href="tabicon.png">
  <link rel="stylesheet" href="home1.css">
</head>
<body class="text-red-500 bg-black font-sans">

  <div class="flex justifyu-between bg-gray-900 space-x-4  flex justify-between items-center p-4 shadow-md">
    <div class="flex justify-between w-full">
    <button onclick="menuBring()" class="text-3xl p-1 border-2 border-red-500 rounded">☰</button>
    <div id="SideMenu" class="flex flex-col fixed top-0 left-0 h-full w-[20%] space-y-2 bg-gray-900 transform -translate-x-full transition-transform duration-300 ease-in-out p-4">
      <div class="flex w-full justify-between w-full">
        <h1 class="text-2xl font-bold">Menu</h1>
        <button onclick="sendMenu()" class="border-2 border-red-500 p-2">✕</button>
      </div>
      <div class="text-white hover:text-red-500 text-2xl p-[2%] font-bold hover:bg-gray-800 rounded">
        <a id="link" href="#">
        <button>Profile</button>
        </a>
      </div>
      <div class="text-white hover:text-red-500 text-2xl p-[2%] font-bold hover:bg-gray-800 rounded">
        <a href="AboutUs.html">
        <button>About Us</button>
        </a>
      </div>
      <div class="text-white hover:text-red-500 text-2xl p-[2%] font-bold hover:bg-gray-800 rounded">
        <a href="privacy.html">
        <button>Privacy Policy</button>
        </a>
      </div>
      <div class="text-white hover:text-red-500 text-2xl p-[2%] font-bold hover:bg-gray-800 rounded">
        <a href="Contact.html">
        <button>Contact</button>
        </a>
      </div>
      <div class="text-white hover:text-red-500 text-2xl p-[2%] font-bold hover:bg-gray-800 rounded">
        <a href="Help And Support.html">
        <button>Help and Support</button>
        </a>
      </div>
    </div>
    <div class="flex space-x-4 w-[60%]">
      <a id="Premium" class="inline-block border-2 border-red-500 text-red-500 font-bold px-4 py-2 rounded hover:bg-red-500 hover:text-black transition duration-300">
        Go Premium
      </a>
      <div class="relative w-[70%]">
        <input type="text" placeholder="Search..." oninput="searchBooks()" id="searchInput" class="p-2 rounded bg-gray-800 text-red-500 border border-red-500 w-full">
        <div id="searchResults" class="absolute bg-gray-900 border border-red-500 rounded mt-1 w-full max-h-60 overflow-y-auto hidden"></div>
      </div>
    <button class="p-2 hover:bg-gray-800 rounded border-2 border-red-500">
  <svg class="h-6 w-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M21 21l-4.35-4.35m2.54-5.15a7 7 0 11-14 0 7 7 0 0114 0z" />
  </svg>
</button>

</div>
</div>
    <img src="Inner Voice Logo.png" alt="logo" class="w-40 rounded-full">

  </div>
  <div id="Welcome" class="text-3xl p-[2%] font-bold"></div>
  <div class="p-[2%] w-full flex flex-col space-y-[2%] overflow-hidden ">
    <h1 class="text-3xl font-bold">Recommended For You</h1>
    <div id="Recommendations" class="scroll-container flex overflow-x-auto space-x-4 scrollbar-hide autoscroll"></div>
  </div>
  <div class="p-[2%] w-full flex flex-col space-y-[2%] overflow-hidden">
    <h1 class="text-3xl font-bold">Science Fiction</h1>
    <div id="Science Fiction" class="scroll-container flex overflow-x-auto space-x-4 scrollbar-hide autoscroll"></div>
  </div>
  <div class="p-[2%] w-full flex flex-col space-y-[2%] overflow-hidden">
    <h1 class="text-3xl font-bold">Crime Thrillers</h1>
    <div id="Crime Thrillers" class="scroll-container flex overflow-x-auto space-x-4 scrollbar-hide autoscroll"></div>
  </div>
  <div class="p-[2%] w-full flex flex-col space-y-[2%] overflow-hidden">
    <h1 class="text-3xl font-bold">Productivity</h1>
    <div id="Productivity" class="scroll-container flex overflow-x-auto space-x-4 scrollbar-hide autoscroll"></div>
  </div>
  <div class="p-[2%] w-full flex flex-col space-y-[2%] overflow-hidden">
    <h1 class="text-3xl font-bold">Novels</h1>
    <div id="Novels" class="scroll-container flex overflow-x-auto space-x-4 scrollbar-hide autoscroll"></div>
  </div>
  <script src="home1.js"></script>
</body>
</html>
