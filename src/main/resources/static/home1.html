<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inner Voice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="tabicon.png">
  <style>
    /* Hide scrollbar for Chrome, Safari and Opera */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .scrollbar-hide {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="text-red-500 bg-black font-sans">

  <div class="flex justifyu-between bg-gray-900 space-x-4  flex justify-between items-center p-4 shadow-md">
    <div class="flex justify-between w-full">
    <button onclick="menuBring()" class="text-3xl p-1 border-2 border-red-500 rounded">☰</button>
    <div id="SideMenu" class="flex flex-col fixed top-0 left-0 h-full w-[20%] space-y-2 bg-gray-900 transform -translate-x-full transition-transform duration-300 ease-in-out p-4">
      <div class="flex w-full justify-between w-full">
        <h1 class="text-2xl font-bold">Menu</h1>
        <button onclick="sendMenu()" class="border-2 border-red-500 p-2">✕</button>
      </div>
      <div class="text-white hover:text-red-500 text-2xl p-[2%] font-bold hover:bg-gray-800 rounded">
        <a id="link" href="#">
        <button>Profile</button>
        </a>
      </div>
      <div class="text-white hover:text-red-500 text-2xl p-[2%] font-bold hover:bg-gray-800 rounded">
        <a href="AboutUs.html">
        <button>About Us</button>
        </a>
      </div>
      <div class="text-white hover:text-red-500 text-2xl p-[2%] font-bold hover:bg-gray-800 rounded">
        <a href="privacy.html">
        <button>Privacy Policy</button>
        </a>
      </div>
      <div class="text-white hover:text-red-500 text-2xl p-[2%] font-bold hover:bg-gray-800 rounded">
        <a href="Contact.html">
        <button>Contact</button>
        </a>
      </div>
      <div class="text-white hover:text-red-500 text-2xl p-[2%] font-bold hover:bg-gray-800 rounded">
        <a href="Help And Support.html">
        <button>Help and Support</button>
        </a>
      </div>
    </div>
    <div class="flex space-x-4 w-[60%]">
      <a id="Premium" class="inline-block border-2 border-red-500 text-red-500 font-bold px-4 py-2 rounded hover:bg-red-500 hover:text-black transition duration-300">
        Go Premium
      </a>
      <div class="relative w-[70%]">
        <input type="text" placeholder="Search..." oninput="searchBooks()" id="searchInput" class="p-2 rounded bg-gray-800 text-red-500 border border-red-500 w-full">
        <div id="searchResults" class="absolute bg-gray-900 border border-red-500 rounded mt-1 w-full max-h-60 overflow-y-auto hidden"></div>
      </div>
    <button class="p-2 hover:bg-gray-800 rounded border-2 border-red-500">
  <svg class="h-6 w-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M21 21l-4.35-4.35m2.54-5.15a7 7 0 11-14 0 7 7 0 0114 0z" />
  </svg>
</button>

</div>
</div>
    <img src="Inner Voice Logo.png" alt="logo" class="w-40 rounded-full">

  </div>
  <div id="Welcome" class="text-3xl p-[2%] font-bold"></div>

  <div class="p-[2%] w-full flex flex-col space-y-[2%] overflow-hiddden">
    <h1 class="text-3xl font-bold">Science Fiction</h1>
    <div id="Science Fiction" class="flex overflow-x-auto space-x-4 scrollbar-hide"></div>
  </div>
  <div class="p-[2%] w-full flex flex-col space-y-[2%] overflow-hiddden">
    <h1 class="text-3xl font-bold">Crime Thrillers</h1>
    <div id="Crime Thrillers" class="flex overflow-x-auto space-x-4 scrollbar-hide"></div>
  </div>
  <div class="p-[2%] w-full flex flex-col space-y-[2%] overflow-hiddden">
    <h1 class="text-3xl font-bold">Productivity</h1>
    <div id="Productivity" class="flex overflow-x-auto space-x-4 scrollbar-hide"></div>
  </div>
  <div class="p-[2%] w-full flex flex-col space-y-[2%] overflow-hiddden">
    <h1 class="text-3xl font-bold">Novels</h1>
    <div id="Novels" class="flex overflow-x-auto space-x-4 scrollbar-hide"></div>
  </div>
  <script>
    function menuBring(){
      document.getElementById("SideMenu").classList.remove("-translate-x-full");
    }
    function sendMenu(){
      document.getElementById("SideMenu").classList.add("-translate-x-full");
    }

    async function loadUser(){
        try{
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('userId');
            const response = await fetch(`http://localhost:8080/users/${userId}`)
            if(response.ok){
                const data = await response.json();
                const name = data.name;
                document.getElementById("Welcome").textContent=`Welcome ${name}`;

                if(data.userCategory === 'PREMIUM_USER'){
                document.getElementById("Premium").style.display = 'none';
            }
            }
            else{
                document.getElementById("Welcome").textContent=`Error Loading Name`;
            }
        }
        catch (error) {
            console.error("Error:", error);
            document.getElementById("Welcome").textContent = "Welcome!";
        }
    }
    loadUser();

    // set profile link
    const params1 = new URLSearchParams(window.location.search);
    const id = params1.get('userId');
    const link = document.getElementById("link");
    link.href = `Profile.html?userId=${id}`;
    const premium=document.getElementById("Premium");
    premium.href=`Premium.html?userId=${id}`;

    // load books
    async function loadBooks(bookType){
        try{
            const response = await fetch(`http://localhost:8080/books/${bookType}`);
            if(response.ok){
                const books = await response.json();
                const container = document.getElementById(bookType);
                container.innerHTML = ''; // clear previous

                books.forEach(book=>{
                    const card = document.createElement('div');
                    const type= document.createElement('p');
                    if(book.bookCategory==='Premium')
                    {
                         type.innerHTML=`Premium`;
                         type.className= "flex text-[#FFC107] justify-left text-sm mb-1";
                    }
                    else
                    {
                        type.innerHTML=`Free`;
                        type.className= "flex text-white justify-left text-sm mb-1";
                    }

                    card.className = "w-40 flex-shrink-0 bg-gray-800 rounded px-2 pt-1 text-center";
                    card.onclick=() => goToBook(book.bookId);
                    const img = document.createElement('img');
                    img.src = book.imageLink;
                    img.alt = book.bookName;
                    img.className = "w-full h-48 object-cover rounded";

                    const title = document.createElement('p');
                    title.textContent = book.bookName;
                    title.className = "mt-2 text-red-500 text-sm font-bold";
                    card.appendChild(type);
                    card.appendChild(img);
                    card.appendChild(title);


                    container.appendChild(card);
                });
            } else {
                console.error('Failed to fetch books:', response.status);
            }
        } catch(error){
            console.error('Error fetching books:', error);
        }
    }

    // call when page loads
    window.addEventListener('DOMContentLoaded', () => {
        loadBooks('Productivity'); // this must match your div id
        loadBooks('Novels');
        loadBooks('Science Fiction');
        loadBooks('Crime Thrillers');
    });

    async function searchBooks(){
    const input = document.getElementById('searchInput').value.trim();
    const resultsDiv = document.getElementById('searchResults');

    if(input === ''){
        resultsDiv.classList.add('hidden');
        resultsDiv.innerHTML = '';
        return;
    }

    try{
        const response = await fetch(`http://localhost:8080/books/search/${input}`);
        if(response.ok){
            const books = await response.json();

            if(books.length === 0){
                resultsDiv.innerHTML = `<p class="p-2 text-gray-400">No results found.</p>`;
            } else {
                resultsDiv.innerHTML = books.map(book => `
                    <div onclick="goToBook(${book.bookId})" class="p-2 cursor-pointer hover:bg-gray-800">
                        ${book.bookName}
                    </div>
                `).join('');
            }

            resultsDiv.classList.remove('hidden');
        } else {
            console.error('Search failed:', response.status);
            resultsDiv.classList.add('hidden');
        }
    } catch(error){
        console.error('Error fetching search:', error);
        resultsDiv.classList.add('hidden');
    }
}

//handle what happens when a book is clicked
async function goToBook(bookId){
    const response=await fetch(`http://localhost:8080/users/${id}`);
    const user= await response.json();
    if(user.userCategory === 'FREE_USER')
    {
        const bookResponse=await fetch(`http://localhost:8080/books/getting/${bookId}`);
        const book=await bookResponse.json();
        if(book.bookCategory === 'Premium')
        {
            window.location.href = `Premium.html?userId=${id}`;
        }
        else
        {
            window.location.href = `BookDetails.html?bookId=${bookId}`;
        }
    }
    else
    {
        window.location.href = `BookDetails.html?bookId=${bookId}`;
    }
}
  </script>

</body>
</html>
