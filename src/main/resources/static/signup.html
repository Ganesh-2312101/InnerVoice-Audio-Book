<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Voice | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="tabicon.png">
    <link rel="stylesheet" href="index.css">
    <style>
        :root {
            --red: #e63946;
            --red-dk: #b52232;
            --bg: #05070d;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e8eaf0;
            --muted: #6b7280;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        /* Animated background orbs */
        .bg-orbs {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: drift 15s ease-in-out infinite alternate;
        }
        .orb-1 { width: 450px; height: 450px; background: rgba(230, 57, 70, 0.12); top: -100px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: rgba(230, 57, 70, 0.06); bottom: -50px; right: -50px; animation-delay: 4s; }
        
        @keyframes drift {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }
        .grid-lines {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</head>
<body class="overflow-x-hidden">

<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>
<div class="grid-lines"></div>

<!-- Header -->
<header class="w-full relative z-10 px-6 py-4 flex justify-between items-center bg-gray-950/20 border-b border-white/5 backdrop-blur-sm">
    <a href="index.html" class="flex items-center gap-3">
        <img src="Inner Voice Logo.png" alt="logo" class="w-12 h-12 rounded-full object-cover border border-red-500/20">
        <span class="text-xl font-bold text-white tracking-wider">Inner<span class="text-red-500">Voice</span></span>
    </a>
    <a href="index.html">
        <button class="bg-gray-900/80 backdrop-blur-md text-red-500 border border-red-500/30 px-5 py-2 rounded-xl hover:bg-red-500 hover:text-black hover:border-red-500 transition duration-300 font-semibold text-sm">
            Home
        </button>
    </a>
</header>

<!-- Main Signup Container -->
<main class="flex-grow flex items-center justify-center px-4 py-12 relative z-10">
    <div class="w-full max-w-[460px] bg-white/[0.02] border border-white/[0.08] rounded-3xl p-8 backdrop-blur-xl shadow-2xl flex flex-col space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-white tracking-wide">Create Account</h1>
            <p class="text-gray-400 text-sm mt-2">Sign up to start listening to your audiobooks</p>
        </div>

        <form id="SignUpForm" class="flex flex-col space-y-5">
            <!-- Full Name -->
            <div class="flex flex-col space-y-1.5">
                <label for="name" class="text-xs font-semibold uppercase tracking-wider text-gray-400">Full Name</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm">👤</span>
                    <input type="text" id="name" name="name" placeholder="John Doe" required 
                           class="w-full bg-white/[0.04] border border-white/[0.08] rounded-xl py-3 pl-11 pr-4 text-white placeholder-gray-500 outline-none focus:border-red-500/60 focus:ring-1 focus:ring-red-500/30 transition duration-200 text-sm">
                </div>
            </div>

            <!-- Email -->
            <div class="flex flex-col space-y-1.5">
                <label for="email" class="text-xs font-semibold uppercase tracking-wider text-gray-400">Email Address</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm">✉️</span>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required 
                           class="w-full bg-white/[0.04] border border-white/[0.08] rounded-xl py-3 pl-11 pr-4 text-white placeholder-gray-500 outline-none focus:border-red-500/60 focus:ring-1 focus:ring-red-500/30 transition duration-200 text-sm">
                </div>
            </div>

            <!-- Username -->
            <div class="flex flex-col space-y-1.5">
                <label for="username" class="text-xs font-semibold uppercase tracking-wider text-gray-400">Username</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm">@</span>
                    <input type="text" id="username" name="username" placeholder="johndoe" required 
                           class="w-full bg-white/[0.04] border border-white/[0.08] rounded-xl py-3 pl-11 pr-4 text-white placeholder-gray-500 outline-none focus:border-red-500/60 focus:ring-1 focus:ring-red-500/30 transition duration-200 text-sm">
                </div>
            </div>

            <!-- Password -->
            <div class="flex flex-col space-y-1.5">
                <label for="password" class="text-xs font-semibold uppercase tracking-wider text-gray-400">Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm">🔒</span>
                    <input type="password" id="password" name="password" placeholder="••••••••" required 
                           class="w-full bg-white/[0.04] border border-white/[0.08] rounded-xl py-3 pl-11 pr-4 text-white placeholder-gray-500 outline-none focus:border-red-500/60 focus:ring-1 focus:ring-red-500/30 transition duration-200 text-sm">
                </div>
            </div>

            <button type="submit" 
                    class="w-full py-3.5 bg-gradient-to-r from-red-500 to-red-700 hover:from-red-600 hover:to-red-800 text-white font-bold rounded-xl transition duration-300 shadow-lg shadow-red-500/20 transform hover:-translate-y-0.5 active:translate-y-0 text-base mt-2">
                Sign Up
            </button>
        </form>

        <div class="flex flex-col space-y-3 pt-2 text-center text-sm border-t border-white/[0.06]">
            <p class="text-gray-400">
                Already have an account? 
                <a href="login.html" class="text-red-500 hover:text-red-400 font-semibold ml-1 hover:underline transition">Login</a>
            </p>
            <p class="text-gray-500 text-xs">
                Are you an admin? 
                <a href="admin-login.html" class="text-red-500 hover:text-red-400 font-semibold ml-1 hover:underline transition">Admin Login</a>
            </p>
        </div>
    </div>
</main>

<footer class="w-full relative z-10 bg-gray-950/40 border-t border-white/5 py-5 text-center text-sm text-gray-500">
    <div class="max-w-7xl mx-auto px-6 flex flex-wrap justify-center gap-x-8 gap-y-2">
        <a href="privacy.html" class="hover:text-white transition">Privacy Policy</a>
        <a href="#" class="hover:text-white transition">Terms of Use</a>
        <a href="#" class="hover:text-white transition">Cancellation & Returns</a>
        <a href="AboutUs.html" class="hover:text-white transition">About Us</a>
        <a href="Contact.html" class="hover:text-white transition">Contact Us</a>
    </div>
</footer>

<script src="signup.js"></script>
</body>
</html>
