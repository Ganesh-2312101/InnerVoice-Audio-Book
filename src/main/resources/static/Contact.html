<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Inner Voice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="tabicon.png">
</head>
<body class="bg-black text-red-500 font-sans">

  <!-- Header -->
  <header class="bg-gray-900 flex justify-between items-center p-4 shadow-md">
    <img src="Inner Voice Logo.png" alt="logo" class="w-40 rounded-full">

      <button onclick="history.back()" class="bg-black text-red-500 border-2 border-red-500 px-6 py-2 rounded-xl hover:bg-red-500 hover:text-black transition">
        Home
      </button>

  </header>

  <!-- Main content -->
  <main class="max-w-4xl mx-auto py-12 px-6">
    <h1 class="text-4xl font-bold mb-6 text-center">Contact Us</h1>
    <p class="mb-8 text-red-300 text-center">
      We'd love to hear from you! Reach out anytime — we're here to help.
    </p>

    <!-- Contact Info -->
    <section class="mb-12">
      <h2 class="text-2xl font-semibold mb-4 text-red-400">Get in Touch</h2>
      <ul class="text-red-300 space-y-2">
        <li>Email: <a href="mailto:support@innervoice.com" class="underline hover:text-red-400">support@innervoice.com</a></li>
        <li>Phone: +91 98765 43210</li>
        <li>Address: Inner Voice HQ, Chennai, India</li>
      </ul>
    </section>

    <!-- Contact Form -->
    <section>
      <h2 class="text-2xl font-semibold mb-4 text-red-400">Send Us a Message</h2>
      <form class="space-y-4 max-w-md">
        <input type="text" placeholder="Your Name" class="w-full px-4 py-2 rounded bg-gray-800 border border-red-500 text-red-200 focus:outline-none focus:border-red-400">
        <input type="email" placeholder="Your Email" class="w-full px-4 py-2 rounded bg-gray-800 border border-red-500 text-red-200 focus:outline-none focus:border-red-400">
        <textarea placeholder="Your Message" rows="4" class="w-full px-4 py-2 rounded bg-gray-800 border border-red-500 text-red-200 focus:outline-none focus:border-red-400"></textarea>
        <button type="submit" class="bg-red-500 text-black font-semibold px-4 py-2 rounded hover:bg-red-600 transition">Send</button>
      </form>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-center py-4 mt-12">
    <p class="text-red-400">&copy; 2025 Inner Voice. All rights reserved.</p>
  </footer>

</body>
</html>
