spring.application.name=InnerVoiceProject

server.port=${PORT:8080}
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/innervoiceproject}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Ganesh@2005}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── Admin Utility Settings ────────────────────────────────────────────────────
# Path where cover images will be downloaded and served as static resources
admin.static.images-dir=src/main/resources/static/images

# Path where audio MP3 files will be generated and served as static resources
admin.static.audio-dir=src/main/resources/static/audio

# VoiceRSS Text-to-Speech API key (free registration at https://www.voicerss.org)
# Leave blank to save TTS script as .txt fallback instead of generating MP3
admin.voicerss.api-key=