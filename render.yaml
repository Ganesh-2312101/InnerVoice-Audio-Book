services:
  - type: web
    name: innervoice
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: innervoice-db
          property: connectionString

databases:
  - name: innervoice-db
    databaseName: innervoice
    plan: free
